<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lead Scorer</title>
<style>
:root{--bg:#0a1022;--panel:#111933;--line:#2a355f;--text:#eef2ff;--muted:#aeb9dd;--accent:#4f8cff;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 10% 0%,#1a2560,transparent 40%),radial-gradient(circle at 90% 0%,#164e63,transparent 35%),var(--bg);color:var(--text)}
.app{max-width:1200px;margin:0 auto;padding:24px}
header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.title{font-size:24px;font-weight:700}.sub{font-size:13px;color:var(--muted)}
.links a{color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:7px 12px;border-radius:999px;margin-left:8px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase}.stat .v{font-size:24px;font-weight:700;margin-top:4px}
.grid{display:grid;grid-template-columns:370px 1fr;gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;margin:10px 0 4px}input,textarea{width:100%;background:#0b1430;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px}textarea{min-height:90px}
button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:10px 12px;cursor:pointer;font-weight:600}button:disabled{opacity:.6;cursor:not-allowed}.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.row{display:flex;gap:8px;flex-wrap:wrap}.locked{border:1px dashed var(--line);border-radius:10px;padding:12px;color:var(--muted)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.toolbar input{max-width:320px}
.lead{display:grid;grid-template-columns:54px 1fr auto;gap:10px;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;background:#0b1430}
.score{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;border:3px solid #334155;font-weight:700}.hot{border-color:var(--good)}.warm{border-color:var(--warn)}.cold{border-color:var(--bad)}
.meta{font-size:12px;color:var(--muted)}.tag{font-size:10px;border:1px solid currentColor;border-radius:999px;padding:2px 6px;margin-left:6px}.tag-hot{color:var(--good)}.tag-warm{color:var(--warn)}.tag-cold{color:var(--bad)}
.follow{border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px}.toast{position:fixed;right:18px;bottom:18px;background:#132146;border:1px solid var(--line);padding:10px 12px;border-radius:8px;display:none}.toast.show{display:block}
@media (max-width:900px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="title">Lead Scorer</div>
      <div class="sub">AI lead qualification - Bug Slayers</div>
    </div>
    <div class="links"><a href="/docs" target="_blank" rel="noreferrer">API Docs</a><a href="/leads" target="_blank" rel="noreferrer">Raw JSON</a></div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="grid">
    <div>
      <section class="card">
        <h3>Stage 1: Lead Scoring</h3>
        <form id="leadForm">
          <label>Name</label><input id="name" required />
          <label>Company</label><input id="company" required />
          <label>Description</label><textarea id="description" required></textarea>
          <div class="row" style="margin-top:10px"><button id="scoreBtn" type="submit">Score with AI</button></div>
        </form>
        <hr style="border-color:var(--line);margin:14px 0">
        <label>Bulk Upload (.xlsx/.csv)</label>
        <input id="bulkFile" type="file" accept=".xlsx,.csv" />
        <div class="row" style="margin-top:8px"><button class="ghost" id="bulkBtn" type="button" disabled>Upload and Score</button></div>
      </section>

      <section class="card" style="margin-top:12px">
        <h3>Stage 2: Follow-up Email</h3>
        <div id="locked" class="locked"><strong>Stage 2 is locked.</strong> Add at least one lead in Stage 1 to unlock this section.</div>
        <form id="followForm" style="display:none">
          <label>Lead Name</label><input id="fName" required />
          <label>Company</label><input id="fCompany" required />
          <label>Context</label><textarea id="fDesc" required></textarea>
          <label>Days Since Last Interaction</label><input id="fDays" type="number" min="0" value="5" required />
          <label>Lead ID (optional)</label><input id="fLeadId" type="number" min="1" />
          <div class="row" style="margin-top:10px"><button id="fBtn" type="submit">Generate Follow-up</button></div>
        </form>
        <div id="fOut" class="follow" style="display:none"><pre id="fText" style="white-space:pre-wrap;margin:0"></pre></div>
        <div id="fList"></div>
      </section>
    </div>

    <section class="card">
      <h3>Pipeline</h3>
      <div class="toolbar">
        <input id="search" placeholder="Search leads..." />
        <button class="ghost" data-sort="score">Score</button>
        <button class="ghost" data-sort="recent">Recent</button>
        <button class="ghost" data-sort="name">Name</button>
        <button class="ghost" id="refreshBtn">Refresh</button>
      </div>
      <div id="list"></div>
      <div class="meta" id="pager"></div>
      <div class="row" style="margin-top:8px"><button class="ghost" id="prevBtn">Previous</button><button class="ghost" id="nextBtn">Next</button></div>
    </section>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const state={leads:[],total:0,limit:20,offset:0,sort:'score',query:'',followups:[]};
const $=(id)=>document.getElementById(id);
const toast=(m,e=false)=>{const t=$('toast');t.textContent=m;t.style.color=e?'#fca5a5':'#e2e8f0';t.className='toast show';setTimeout(()=>t.className='toast',2500)};
const esc=(s)=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const tier=(s)=>s==null?['-', '']:s>=7?['hot','tag-hot']:s>=4?['warm','tag-warm']:['cold','tag-cold'];
const ago=(iso)=>{if(!iso)return'';const d=(Date.now()-new Date(iso).getTime())/1000;return d<60?'now':d<3600?Math.floor(d/60)+'m':d<86400?Math.floor(d/3600)+'h':Math.floor(d/86400)+'d';};
function renderStats(){const scored=state.leads.filter(l=>l.score!=null);const avg=scored.length?(scored.reduce((a,b)=>a+b.score,0)/scored.length).toFixed(1):'0';const hot=state.leads.filter(l=>(l.score??0)>=7).length;const today=state.leads.filter(l=>l.created_at&&(Date.now()-new Date(l.created_at).getTime())<86400000).length;$('stats').innerHTML=`<div class="stat"><div class="k">Total Leads</div><div class="v">${state.leads.length}</div></div><div class="stat"><div class="k">Average Score</div><div class="v">${avg}/10</div></div><div class="stat"><div class="k">Hot Leads</div><div class="v">${hot}</div></div><div class="stat"><div class="k">Added Today</div><div class="v">${today}</div></div>`;}
function renderLeads(){const q=state.query.toLowerCase().trim();let list=[...state.leads];if(q)list=list.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.company||'').toLowerCase().includes(q)||(l.description||'').toLowerCase().includes(q));if(state.sort==='score')list.sort((a,b)=>(b.score??-1)-(a.score??-1));if(state.sort==='recent')list.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));if(state.sort==='name')list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));$('list').innerHTML=list.length?list.map(l=>{const [klass,tag]=tier(l.score);return `<div class="lead"><div class="score ${klass}">${l.score??'-'}</div><div><div><strong>${esc(l.name)}</strong> <span class="meta">${esc(l.company)}</span> <span class="tag ${tag}">${klass?klass.toUpperCase():'-'}</span></div>${l.score_reason?`<div class="meta">${esc(l.score_reason)}</div>`:''}</div><div class="meta">${ago(l.created_at)}</div></div>`;}).join(''):'<div class="meta">No leads found.</div>';const s=state.total===0?0:state.offset+1;const e=Math.min(state.offset+state.limit,state.total);$('pager').textContent=`Showing ${s}-${e} of ${state.total}`;$('prevBtn').disabled=state.offset<=0;$('nextBtn').disabled=(state.offset+state.limit)>=state.total;}
function renderFollowups(){const unlocked=state.leads.length>0;$('locked').style.display=unlocked?'none':'block';$('followForm').style.display=unlocked?'block':'none';const c=$('fList');if(!unlocked){c.innerHTML='';return;}c.innerHTML=state.followups.length?state.followups.map(f=>`<div class="follow"><strong>${esc(f.lead_name)}</strong> - ${esc(f.company)}<div class="meta">${esc(String(f.days_since_last_interaction??0))} days since contact</div><div class="meta">${esc((f.email_text||'').slice(0,160))}${(f.email_text||'').length>160?'...':''}</div></div>`).join(''):'<div class="meta">No follow-ups yet.</div>';}
async function loadLeads(ofs=0){state.offset=ofs;const r=await fetch(`/leads?limit=${state.limit}&offset=${ofs}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();const items=Array.isArray(d)?d:(Array.isArray(d.items)?d.items:[]);state.leads=items.map(x=>({...x,id:x.id??x.lead_id??null}));state.total=d.total??items.length;renderStats();renderLeads();renderFollowups();}
async function loadFollowups(){const r=await fetch('/followups?limit=5&offset=0');if(!r.ok)return;const d=await r.json();state.followups=Array.isArray(d)?d:[];renderFollowups();}
$('search').addEventListener('input',e=>{state.query=e.target.value;renderLeads();});
document.querySelectorAll('[data-sort]').forEach(b=>b.addEventListener('click',()=>{state.sort=b.dataset.sort;renderLeads();}));
$('refreshBtn').addEventListener('click',()=>loadLeads(state.offset).catch(e=>toast(e.message,true)));
$('prevBtn').addEventListener('click',()=>loadLeads(Math.max(0,state.offset-state.limit)).catch(e=>toast(e.message,true)));
$('nextBtn').addEventListener('click',()=>loadLeads(state.offset+state.limit).catch(e=>toast(e.message,true)));
$('bulkFile').addEventListener('change',()=>{$('bulkBtn').disabled=!$('bulkFile').files[0];});
$('bulkBtn').addEventListener('click',async()=>{const f=$('bulkFile').files[0];if(!f)return;const btn=$('bulkBtn');btn.disabled=true;btn.textContent='Uploading...';try{const form=new FormData();form.append('file',f);const r=await fetch('/leads/bulk-upload',{method:'POST',body:form});const d=await r.json();if(!r.ok)throw new Error(d?.error||`HTTP ${r.status}`);toast(`Bulk upload complete: ${d.created_count}/${d.total_rows} created`);$('bulkFile').value='';await loadLeads(0);}catch(e){toast('Upload error: '+e.message,true);}finally{btn.disabled=true;btn.textContent='Upload and Score';}});
$('leadForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload={name:$('name').value.trim(),company:$('company').value.trim(),description:$('description').value.trim()};if(!payload.name||!payload.company||!payload.description)return;const b=$('scoreBtn');b.disabled=true;b.textContent='Scoring...';try{const r=await fetch('/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!r.ok)throw new Error(await r.text()||`HTTP ${r.status}`);const d=await r.json();toast(`Scored ${d.name} -> ${d.score}`);e.target.reset();await loadLeads(0);}catch(err){toast('Error: '+err.message,true);}finally{b.disabled=false;b.textContent='Score with AI';}});
$('followForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload={name:$('fName').value.trim(),company:$('fCompany').value.trim(),description:$('fDesc').value.trim(),days_since_last_interaction:Number($('fDays').value)||0};const lid=$('fLeadId').value.trim();if(lid)payload.lead_id=Number(lid);const b=$('fBtn');b.disabled=true;b.textContent='Generating...';try{const r=await fetch('/followups/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok)throw new Error(d?.error||`HTTP ${r.status}`);$('fText').textContent=d.email_text||'';$('fOut').style.display='block';toast(`Follow-up generated for ${d.lead_name}`);await loadFollowups();}catch(err){toast('Follow-up error: '+err.message,true);}finally{b.disabled=false;b.textContent='Generate Follow-up';}});
loadLeads(0).then(loadFollowups).catch(e=>{toast(e.message,true);$('list').innerHTML='<div class="meta">Could not load leads.</div>';});
</script>
</body>
</html>
